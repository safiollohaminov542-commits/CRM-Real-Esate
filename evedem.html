{% extends "base.html" %}
{% block title %}Уведомления{% endblock %}

{% block content %}
<style>
    .notifications-container {
        max-width: 900px;
        margin: 0 auto;
    }
    
    .page-header {
        margin-bottom: 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 16px;
    }
    
    .page-header h1 {
        font-size: 28px;
        font-weight: 700;
        color: #1a1a2e;
        display: flex;
        align-items: center;
        gap: 12px;
    }
    
    .unread-badge {
        background: #2563eb;
        color: white;
        padding: 4px 12px;
        border-radius: 30px;
        font-size: 14px;
    }
    
    .filter-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }
    
    .filter-btn {
        padding: 8px 16px;
        border-radius: 30px;
        border: 1px solid #e1e4e8;
        background: white;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 13px;
    }
    
    .filter-btn.active {
        background: #2563eb;
        color: white;
        border-color: #2563eb;
    }
    
    .notifications-list {
        background: white;
        border-radius: 20px;
        border: 1px solid #eef2f6;
        overflow: hidden;
    }
    
    .notification-item {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        border-bottom: 1px solid #f0f2f5;
        transition: background 0.2s;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
    }
    
    .notification-item:hover {
        background: #f8fafc;
    }
    
    .notification-item.unread {
        background: #eff6ff;
    }
    
    .notification-icon {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 16px;
        flex-shrink: 0;
    }
    
    .icon-task { background: #dbeafe; color: #2563eb; }
    .icon-chat { background: #dcfce7; color: #10b981; }
    .icon-zayavka { background: #fed7aa; color: #ea580c; }
    .icon-lid { background: #e0e7ff; color: #4f46e5; }
    .icon-system { background: #f1f5f9; color: #64748b; }
    
    .notification-content {
        flex: 1;
    }
    
    .notification-title {
        font-weight: 600;
        color: #1a1a2e;
        margin-bottom: 4px;
    }
    
    .notification-message {
        font-size: 13px;
        color: #5b6e8c;
        margin-bottom: 4px;
    }
    
    .notification-date {
        font-size: 11px;
        color: #8b9dc3;
    }
    
    .notification-actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
    }
    
    .mark-read-btn, .delete-notif-btn {
        background: transparent;
        border: none;
        cursor: pointer;
        font-size: 14px;
        padding: 6px;
        border-radius: 8px;
        transition: all 0.2s;
    }
    
    .mark-read-btn { color: #2563eb; }
    .delete-notif-btn { color: #ef4444; }
    
    .mark-read-btn:hover, .delete-notif-btn:hover {
        background: #f0f2f5;
    }
    
    .empty-state {
        text-align: center;
        padding: 60px;
        color: #8b9dc3;
    }
    
    .btn-primary {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }
    
    @media (max-width: 768px) {
        .notification-item {
            flex-wrap: wrap;
        }
        .notification-actions {
            margin-top: 10px;
            margin-left: 48px;
        }
    }
</style>

<div class="notifications-container">
    <div class="page-header">
        <h1>
            <i class="fas fa-bell"></i> Уведомления
            <span class="unread-badge" id="unreadCount">0</span>
        </h1>
        <div style="display: flex; gap: 12px;">
            <button class="btn-primary" onclick="markAllAsRead()">
                <i class="fas fa-check-double"></i> Отметить все прочитанными
            </button>
        </div>
    </div>
    
    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all" onclick="filterNotifications('all')">Все</button>
        <button class="filter-btn" data-filter="task" onclick="filterNotifications('task')">
            <i class="fas fa-tasks"></i> Задачи
        </button>
        <button class="filter-btn" data-filter="zayavka" onclick="filterNotifications('zayavka')">
            <i class="fas fa-file-alt"></i> Заявки
        </button>
        <button class="filter-btn" data-filter="chat" onclick="filterNotifications('chat')">
            <i class="fas fa-comments"></i> Чат
        </button>
        <button class="filter-btn" data-filter="lid" onclick="filterNotifications('lid')">
            <i class="fas fa-users"></i> Лиды
        </button>
        <button class="filter-btn" data-filter="system" onclick="filterNotifications('system')">
            <i class="fas fa-cog"></i> Системные
        </button>
    </div>
    
    <div class="notifications-list" id="notificationsList">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Загрузка...</div>
    </div>
</div>

<script>
let allNotifications = [];
let currentFilter = 'all';

function getNotificationIcon(type) {
    const icons = {
        'task': '<i class="fas fa-tasks"></i>',
        'chat': '<i class="fas fa-comments"></i>',
        'zayavka': '<i class="fas fa-file-alt"></i>',
        'lid': '<i class="fas fa-users"></i>',
        'system': '<i class="fas fa-cog"></i>'
    };
    return icons[type] || icons['system'];
}

function getNotificationIconClass(type) {
    const classes = {
        'task': 'icon-task',
        'chat': 'icon-chat',
        'zayavka': 'icon-zayavka',
        'lid': 'icon-lid',
        'system': 'icon-system'
    };
    return classes[type] || 'icon-system';
}

async function loadNotifications() {
    const response = await fetch('/api/notifications');
    const data = await response.json();
    allNotifications = data.notifications;
    document.getElementById('unreadCount').textContent = data.unread_count;
    renderNotifications();
}

function filterNotifications(type) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.filter === type) {
            btn.classList.add('active');
        }
    });
    renderNotifications();
}

function renderNotifications() {
    const container = document.getElementById('notificationsList');
    let filtered = allNotifications;
    
    if (currentFilter !== 'all') {
        filtered = allNotifications.filter(n => n.type === currentFilter);
    }
    
    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i> Нет уведомлений</div>';
        return;
    }
    
    container.innerHTML = filtered.map(notif => `
        <div class="notification-item ${notif.is_read === 0 ? 'unread' : ''}" data-id="${notif.id}" onclick="handleNotificationClick(${notif.id}, '${notif.link}')">
            <div class="notification-icon ${getNotificationIconClass(notif.type)}">
                ${getNotificationIcon(notif.type)}
            </div>
            <div class="notification-content">
                <div class="notification-title">${escapeHtml(notif.title)}</div>
                <div class="notification-message">${escapeHtml(notif.message)}</div>
                <div class="notification-date">${formatDate(notif.created_date)}</div>
            </div>
            <div class="notification-actions" onclick="event.stopPropagation()">
                ${notif.is_read === 0 ? `
                    <button class="mark-read-btn" onclick="markAsRead(${notif.id})">
                        <i class="fas fa-check"></i>
                    </button>
                ` : ''}
                <button class="delete-notif-btn" onclick="deleteNotification(${notif.id})">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </div>
    `).join('');
}

function handleNotificationClick(id, link) {
    markAsRead(id);
    if (link) {
        window.location.href = link;
    }
}

async function markAsRead(id) {
    await fetch('/api/notifications/mark-read', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: id })
    });
    loadNotifications();
    updateUnreadCount();
}

async function markAllAsRead() {
    await fetch('/api/notifications/mark-all-read', { method: 'POST' });
    loadNotifications();
    updateUnreadCount();
}

async function deleteNotification(id) {
    if (confirm('Удалить уведомление?')) {
        await fetch(`/api/notifications/${id}`, { method: 'DELETE' });
        loadNotifications();
        updateUnreadCount();
    }
}

function formatDate(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const diff = now - date;
    
    if (diff < 60000) return 'только что';
    if (diff < 3600000) return `${Math.floor(diff / 60000)} мин назад`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)} ч назад`;
    return date.toLocaleDateString('ru-RU');
}

async function updateUnreadCount() {
    const response = await fetch('/api/notifications/unread/count');
    const data = await response.json();
    const unreadElement = document.getElementById('unreadCount');
    if (unreadElement) unreadElement.textContent = data.unread_count;
    
    // Обновление счетчика в sidebar
    const sidebarBadge = document.getElementById('notificationsBadge');
    if (sidebarBadge) {
        if (data.unread_count > 0) {
            sidebarBadge.style.display = 'inline-flex';
            sidebarBadge.textContent = data.unread_count > 9 ? '9+' : data.unread_count;
        } else {
            sidebarBadge.style.display = 'none';
        }
    }
}

loadNotifications();
// Обновление каждые 10 секунд
setInterval(() => { loadNotifications(); updateUnreadCount(); }, 10000);
</script>
{% endblock %}
