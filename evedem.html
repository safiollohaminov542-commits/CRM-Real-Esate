{% extends "base.html" %}
{% block title %}Огоҳиҳо{% endblock %}

{% block content %}
<style>
    .notif-page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 24px;
    }

    .notif-page-header-left h1 {
        font-size: 28px;
        font-weight: 700;
        color: var(--text-dark);
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 4px;
    }

    .notif-page-header-left p {
        color: var(--text-soft);
        font-size: 14px;
    }

    .unread-badge {
        background: var(--green-primary);
        color: white;
        padding: 4px 12px;
        border-radius: 30px;
        font-size: 13px;
        font-weight: 600;
    }

    .filter-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }

    .filter-btn {
        padding: 9px 18px;
        border-radius: 30px;
        border: 1.5px solid var(--border-soft);
        background: white;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-medium);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: inherit;
    }

    .filter-btn:hover {
        border-color: var(--green-primary);
        color: var(--green-primary);
    }

    .filter-btn.active {
        background: var(--green-primary);
        color: white;
        border-color: var(--green-primary);
    }

    .notifications-list {
        background: white;
        border-radius: var(--radius);
        border: 1px solid var(--border-soft);
        overflow: hidden;
    }

    .notification-item {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border-soft);
        transition: background 0.2s;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        gap: 16px;
    }

    .notification-item:last-child {
        border-bottom: none;
    }

    .notification-item:hover {
        background: var(--green-soft);
    }

    .notification-item.unread {
        background: var(--green-soft);
    }

    .notification-item.unread::before {
        content: '';
        width: 4px;
        height: 38px;
        background: var(--green-primary);
        border-radius: 4px;
        margin-right: -8px;
    }

    .notification-icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 18px;
    }

    .icon-task { background: #e0f2fe; color: #0369a1; }
    .icon-chat { background: var(--green-soft); color: var(--green-primary); }
    .icon-zayavka { background: #fef3c7; color: #b45309; }
    .icon-lid { background: #fce7f3; color: #be185d; }
    .icon-system { background: #f1f5f9; color: #64748b; }

    .notification-content {
        flex: 1;
        min-width: 0;
    }

    .notification-title {
        font-weight: 600;
        color: var(--text-dark);
        margin-bottom: 4px;
        font-size: 14px;
    }

    .notification-message {
        font-size: 13px;
        color: var(--text-medium);
        margin-bottom: 4px;
        line-height: 1.4;
    }

    .notification-date {
        font-size: 11px;
        color: var(--text-soft);
    }

    .notification-actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
    }

    .mark-read-btn, .delete-notif-btn {
        background: var(--bg-page);
        border: none;
        cursor: pointer;
        font-size: 13px;
        padding: 8px;
        border-radius: 10px;
        transition: all 0.2s;
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .mark-read-btn { color: var(--green-primary); }
    .delete-notif-btn { color: #ef4444; }

    .mark-read-btn:hover { background: var(--green-light); }
    .delete-notif-btn:hover { background: #fee2e2; }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-soft);
    }

    .empty-state i {
        font-size: 48px;
        color: var(--green-primary);
        opacity: 0.3;
        margin-bottom: 12px;
        display: block;
    }

    @media (max-width: 768px) {
        .notification-item {
            flex-wrap: wrap;
            padding: 14px;
        }
        .notification-actions {
            margin-top: 10px;
            margin-left: 60px;
        }
        .filter-btn {
            padding: 7px 12px;
            font-size: 12px;
        }
    }

    @media (max-width: 480px) {
        .notif-page-header-left h1 {
            font-size: 22px;
        }
        .notification-icon {
            width: 40px;
            height: 40px;
            font-size: 16px;
        }
    }
</style>

<div class="notif-page-header">
    <div class="notif-page-header-left">
        <h1>
            <i class="fas fa-bell"></i> Огоҳиҳо
            <span class="unread-badge" id="unreadCount">0</span>
        </h1>
        <p>Хабарҳои нав ва санҷидашудаи система</p>
    </div>
    <button class="btn-primary" onclick="markAllAsRead()">
        <i class="fas fa-check-double"></i> Ҳамаро санҷидашуда қайд кардан
    </button>
</div>

<div class="filter-buttons">
    <button class="filter-btn active" data-filter="all" onclick="filterNotifications('all')">
        <i class="fas fa-list"></i> Ҳама
    </button>
    <button class="filter-btn" data-filter="task" onclick="filterNotifications('task')">
        <i class="fas fa-tasks"></i> Вазифаҳо
    </button>
    <button class="filter-btn" data-filter="zayavka" onclick="filterNotifications('zayavka')">
        <i class="fas fa-file-alt"></i> Заявкаҳо
    </button>
    <button class="filter-btn" data-filter="chat" onclick="filterNotifications('chat')">
        <i class="fas fa-comments"></i> Суҳбат
    </button>
    <button class="filter-btn" data-filter="lid" onclick="filterNotifications('lid')">
        <i class="fas fa-fire"></i> Лидҳо
    </button>
    <button class="filter-btn" data-filter="system" onclick="filterNotifications('system')">
        <i class="fas fa-cog"></i> Системавӣ
    </button>
</div>

<div class="notifications-list" id="notificationsList">
    <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><div>Бор шуда истодааст...</div></div>
</div>

<script>
let allNotifications = [];
let currentFilter = 'all';

function getNotificationIcon(type) {
    const icons = {
        'task': '<i class="fas fa-tasks"></i>',
        'chat': '<i class="fas fa-comments"></i>',
        'zayavka': '<i class="fas fa-file-alt"></i>',
        'lid': '<i class="fas fa-fire"></i>',
        'system': '<i class="fas fa-cog"></i>'
    };
    return icons[type] || icons['system'];
}

function getNotificationIconClass(type) {
    const classes = {
        'task': 'icon-task',
        'chat': 'icon-chat',
        'zayavka': 'icon-zayavka',
        'lid': 'icon-lid',
        'system': 'icon-system'
    };
    return classes[type] || 'icon-system';
}

async function loadNotifications() {
    try {
        const response = await fetch('/api/notifications');
        const data = await response.json();
        allNotifications = data.notifications || [];
        document.getElementById('unreadCount').textContent = data.unread_count || 0;
        renderNotifications();
    } catch (e) {
        document.getElementById('notificationsList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><div>Хатогии бор кардан</div></div>';
    }
}

function filterNotifications(type) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.filter === type) {
            btn.classList.add('active');
        }
    });
    renderNotifications();
}

function renderNotifications() {
    const container = document.getElementById('notificationsList');
    let filtered = allNotifications;

    if (currentFilter !== 'all') {
        filtered = allNotifications.filter(n => n.type === currentFilter);
    }

    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i><div>Огоҳӣ нест</div></div>';
        return;
    }

    container.innerHTML = filtered.map(notif => `
        <div class="notification-item ${notif.is_read === 0 ? 'unread' : ''}" data-id="${notif.id}" onclick="handleNotificationClick(${notif.id}, '${notif.link || ''}')">
            <div class="notification-icon ${getNotificationIconClass(notif.type)}">
                ${getNotificationIcon(notif.type)}
            </div>
            <div class="notification-content">
                <div class="notification-title">${escapeHtml(notif.title)}</div>
                <div class="notification-message">${escapeHtml(notif.message)}</div>
                <div class="notification-date"><i class="far fa-clock"></i> ${formatRelativeDate(notif.created_date)}</div>
            </div>
            <div class="notification-actions" onclick="event.stopPropagation()">
                ${notif.is_read === 0 ? `
                    <button class="mark-read-btn" onclick="markAsRead(${notif.id})" title="Санҷидашуда">
                        <i class="fas fa-check"></i>
                    </button>
                ` : ''}
                <button class="delete-notif-btn" onclick="deleteNotification(${notif.id})" title="Ҳазф">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </div>
    `).join('');
}

function handleNotificationClick(id, link) {
    markAsRead(id);
    if (link && link !== 'null' && link !== '') {
        window.location.href = link;
    }
}

async function markAsRead(id) {
    await fetch('/api/notifications/mark-read', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: id })
    });
    loadNotifications();
}

async function markAllAsRead() {
    await fetch('/api/notifications/mark-all-read', { method: 'POST' });
    loadNotifications();
}

async function deleteNotification(id) {
    if (confirm('Огоҳиро ҳазф мекунед?')) {
        await fetch(`/api/notifications/${id}`, { method: 'DELETE' });
        loadNotifications();
    }
}

function formatRelativeDate(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const diff = now - date;

    if (diff < 60000) return 'ҳозира';
    if (diff < 3600000) return `${Math.floor(diff / 60000)} дақиқа пеш`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)} соат пеш`;
    if (diff < 604800000) return `${Math.floor(diff / 86400000)} рӯз пеш`;
    return date.toLocaleDateString('ru-RU');
}

loadNotifications();
setInterval(loadNotifications, 15000);
</script>
{% endblock %}
