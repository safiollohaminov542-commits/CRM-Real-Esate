{% extends "base.html" %}
{% block title %}Вазифаҳо{% endblock %}

{% block content %}
<style>
    .zad-page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 24px;
    }

    .zad-page-header-left h1 {
        font-size: 28px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 4px;
    }

    .zad-page-header-left p {
        color: var(--text-soft);
        font-size: 14px;
    }

    .filters-bar {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
        flex-wrap: wrap;
        align-items: center;
    }

    .filter-pill {
        padding: 9px 18px;
        border-radius: 30px;
        border: 1.5px solid var(--border-soft);
        background: white;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-medium);
        font-family: inherit;
    }

    .filter-pill:hover {
        border-color: var(--green-primary);
        color: var(--green-primary);
    }

    .filter-pill.active {
        background: var(--green-primary);
        color: white;
        border-color: var(--green-primary);
    }

    .tasks-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 20px;
    }

    .task-card {
        background: white;
        border-radius: var(--radius);
        padding: 20px;
        border: 1px solid var(--border-soft);
        transition: all 0.2s;
        position: relative;
    }

    .task-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-hover);
        border-color: var(--green-primary);
    }

    .task-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 14px;
        gap: 10px;
    }

    .task-header h3 {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-dark);
        line-height: 1.3;
    }

    .task-body p {
        color: var(--text-medium);
        font-size: 13px;
        line-height: 1.5;
        margin-bottom: 14px;
    }

    .task-photo {
        width: 100%;
        border-radius: 14px;
        margin-bottom: 12px;
        max-height: 180px;
        object-fit: cover;
    }

    .task-meta {
        background: var(--green-soft);
        padding: 12px;
        border-radius: 14px;
        margin: 12px 0;
        font-size: 12px;
        color: var(--text-medium);
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .task-meta div {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .task-meta i {
        width: 16px;
        color: var(--green-primary);
    }

    .task-footer {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .status-select {
        flex: 1;
        padding: 10px 12px;
        background: var(--bg-page);
        border: 1.5px solid transparent;
        border-radius: 12px;
        font-size: 12px;
        cursor: pointer;
        font-family: inherit;
        color: var(--text-dark);
    }

    .status-select:focus {
        outline: none;
        border-color: var(--green-primary);
        background: white;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-soft);
        grid-column: 1 / -1;
    }

    .empty-state i {
        font-size: 48px;
        color: var(--green-primary);
        opacity: 0.3;
        margin-bottom: 12px;
        display: block;
    }

    .task-actions {
        display: flex;
        gap: 6px;
    }

    .edit-btn, .delete-btn {
        background: var(--bg-page);
        border: none;
        font-size: 13px;
        cursor: pointer;
        padding: 8px;
        border-radius: 10px;
        transition: all 0.2s;
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .edit-btn { color: var(--green-primary); }
    .delete-btn { color: #ef4444; }
    .edit-btn:hover { background: var(--green-soft); }
    .delete-btn:hover { background: #fee2e2; }

    .file-input-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        background: var(--green-soft);
        color: var(--green-primary);
        border-radius: 10px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        border: none;
        font-family: inherit;
    }

    .file-input-label:hover {
        background: var(--green-light);
    }

    .preview-image {
        margin-top: 8px;
        max-width: 100px;
        border-radius: 10px;
    }

    @media (max-width: 480px) {
        .tasks-grid {
            grid-template-columns: 1fr;
        }
        .filter-pill {
            padding: 7px 14px;
            font-size: 12px;
        }
    }
</style>

<div class="zad-page-header">
    <div class="zad-page-header-left">
        <h1>Вазифаҳо</h1>
        <p>Идоракунии вазифаҳои кормандон</p>
    </div>
    <button class="btn-primary" onclick="showAddTaskModal()">
        <i class="fas fa-plus"></i> Эҷоди вазифа
    </button>
</div>

<div class="filters-bar">
    <button class="filter-pill active" data-status="all" onclick="setStatusFilter('all')">Ҳама</button>
    <button class="filter-pill" data-status="new" onclick="setStatusFilter('new')">🟢 Нав</button>
    <button class="filter-pill" data-status="progress" onclick="setStatusFilter('progress')">🟡 Дар ҷараён</button>
    <button class="filter-pill" data-status="done" onclick="setStatusFilter('done')">✅ Анҷомёфта</button>
    <button class="filter-pill" data-status="cancel" onclick="setStatusFilter('cancel')">🔴 Бекоршуда</button>
</div>

<div class="tasks-grid" id="tasksGrid">
    <div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Бор шуда истодааст...</div>
</div>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="taskModalTitle"><i class="fas fa-plus-circle"></i> Эҷоди вазифа</h2>
            <span class="close" onclick="closeTaskModal()">&times;</span>
        </div>
        <form id="taskForm" enctype="multipart/form-data">
            <input type="hidden" id="taskId">
            <div style="padding: 24px;">
                <div class="form-group">
                    <label><i class="fas fa-heading"></i> Унвон *</label>
                    <input type="text" id="taskTitle" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Тавсиф</label>
                    <textarea id="taskDescription" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user-check"></i> Иҷрокунанда *</label>
                    <select id="taskExecutor" required></select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-image"></i> Сурат</label>
                    <input type="file" id="taskPhotoFile" accept="image/*" style="display:none;">
                    <button type="button" class="file-input-label" onclick="document.getElementById('taskPhotoFile').click()">
                        <i class="fas fa-upload"></i> Интихоби сурат
                    </button>
                    <div id="taskPhotoPreview"></div>
                </div>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-secondary" onclick="closeTaskModal()">
                    <i class="fas fa-times"></i> Бекор кардан
                </button>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i> Захира кардан
                </button>
            </div>
        </form>
    </div>
</div>

<script>
let usersList = [];
let currentEditTaskId = null;
let currentStatusFilter = 'all';

function setStatusFilter(status) {
    currentStatusFilter = status;
    document.querySelectorAll('.filter-pill').forEach(p => {
        p.classList.toggle('active', p.dataset.status === status);
    });
    loadTasks();
}

async function loadUsersList() {
    try {
        const response = await fetch('/api/users/list');
        usersList = await response.json();
        const select = document.getElementById('taskExecutor');
        select.innerHTML = '<option value="">Интихоб кунед...</option>' +
            usersList.map(u => `<option value="${u.id}">${escapeHtml(u.full_name)} (${u.category})</option>`).join('');
    } catch (e) { /* */ }
}

async function loadTasks() {
    try {
        const status = currentStatusFilter;
        const response = await fetch(`/api/tasks?status=${status}`);
        const tasks = await response.json();

        const grid = document.getElementById('tasksGrid');
        if (!tasks || tasks.length === 0) {
            grid.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><div>Вазифа нест</div></div>';
            return;
        }

        grid.innerHTML = tasks.map(task => `
            <div class="task-card">
                <div class="task-header">
                    <h3>${escapeHtml(task.title)}</h3>
                    <span class="status-badge status-${task.status}">${getStatusText(task.status)}</span>
                </div>
                <div class="task-body">
                    <p>${escapeHtml(task.description || 'Бе тавсиф')}</p>
                    ${task.photo ? `<img src="${task.photo}" class="task-photo" onerror="this.style.display='none'">` : ''}
                    <div class="task-meta">
                        <div><i class="fas fa-user"></i> Муаллиф: ${escapeHtml(task.author_name)}</div>
                        <div><i class="fas fa-user-check"></i> Иҷрокунанда: ${escapeHtml(task.executor_name)}</div>
                        <div><i class="far fa-calendar"></i> ${new Date(task.created_date).toLocaleString('ru-RU')}</div>
                    </div>
                </div>
                <div class="task-footer">
                    <select class="status-select" onchange="updateTaskStatus(${task.id}, this.value)">
                        <option value="new" ${task.status === 'new' ? 'selected' : ''}>🟢 Нав</option>
                        <option value="progress" ${task.status === 'progress' ? 'selected' : ''}>🟡 Дар ҷараён</option>
                        <option value="done" ${task.status === 'done' ? 'selected' : ''}>✅ Анҷомёфта</option>
                        <option value="cancel" ${task.status === 'cancel' ? 'selected' : ''}>🔴 Бекоршуда</option>
                    </select>
                    <div class="task-actions">
                        <button class="edit-btn" onclick="editTask(${task.id})" title="Таҳрир"><i class="fas fa-edit"></i></button>
                        <button class="delete-btn" onclick="deleteTask(${task.id})" title="Ҳазф"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (e) {
        document.getElementById('tasksGrid').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><div>Хатогии бор кардани вазифаҳо</div></div>';
    }
}

async function updateTaskStatus(id, status) {
    const formData = new FormData();
    formData.append('status', status);
    await fetch(`/api/tasks/${id}`, { method: 'PUT', body: formData });
    loadTasks();
}

async function deleteTask(id) {
    if (confirm('Вазифаро ҳазф мекунед?')) {
        await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
        loadTasks();
    }
}

async function editTask(id) {
    const response = await fetch('/api/tasks');
    const tasks = await response.json();
    const task = tasks.find(t => t.id === id);

    if (task) {
        currentEditTaskId = id;
        document.getElementById('taskModalTitle').innerHTML = '<i class="fas fa-edit"></i> Таҳрири вазифа';
        document.getElementById('taskId').value = task.id;
        document.getElementById('taskTitle').value = task.title;
        document.getElementById('taskDescription').value = task.description || '';
        document.getElementById('taskExecutor').value = task.executor_id;
        if (task.photo) {
            document.getElementById('taskPhotoPreview').innerHTML = `<img src="${task.photo}" class="preview-image">`;
        } else {
            document.getElementById('taskPhotoPreview').innerHTML = '';
        }
        document.getElementById('taskModal').style.display = 'block';
    }
}

document.getElementById('taskForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const taskId = document.getElementById('taskId').value;
    const formData = new FormData();

    formData.append('title', document.getElementById('taskTitle').value);
    formData.append('description', document.getElementById('taskDescription').value);
    formData.append('executor_id', document.getElementById('taskExecutor').value);

    const photoFile = document.getElementById('taskPhotoFile').files[0];
    if (photoFile) formData.append('photo_file', photoFile);

    const url = taskId ? `/api/tasks/${taskId}` : '/api/tasks';
    const method = taskId ? 'PUT' : 'POST';

    const response = await fetch(url, { method: method, body: formData });

    if (response.ok) {
        closeTaskModal();
        loadTasks();
        alert(taskId ? 'Вазифа навсозӣ шуд!' : 'Вазифа эҷод шуд!');
    } else {
        alert('Хатогии захира');
    }
});

function showAddTaskModal() {
    currentEditTaskId = null;
    document.getElementById('taskModalTitle').innerHTML = '<i class="fas fa-plus-circle"></i> Эҷоди вазифа';
    document.getElementById('taskForm').reset();
    document.getElementById('taskId').value = '';
    document.getElementById('taskPhotoPreview').innerHTML = '';
    document.getElementById('taskModal').style.display = 'block';
}

function closeTaskModal() {
    document.getElementById('taskModal').style.display = 'none';
}

loadUsersList();
loadTasks();
</script>
{% endblock %}
